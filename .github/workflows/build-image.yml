name: Build container images

on:
  push:
    branches: [master]
  workflow_dispatch:

# A new push to the default branch should cancel any in-progress build for an
# older commit.
concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: this workflow only validates the image; publishing is
# handled by .github/workflows/release.yml.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            dockerfile: ./Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - name: Compute apt cache-bust date
        id: apt-cache
        run: echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      # Build the image defined by the repo-root Dockerfile but do not push it.
      # `load: true` puts the built image in the local Docker daemon so the
      # subsequent Trivy step can scan it by tag. Release publishing happens in
      # .github/workflows/release.yml.
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: |
            ${{ github.event.repository.name }}-${{ matrix.name }}:${{ github.sha }}
            ${{ github.event.repository.name }}-${{ matrix.name }}:latest
          build-args: |
            APT_CACHE_DATE=${{ steps.apt-cache.outputs.date }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: false

      # Trivy scans the built image for HIGH/CRITICAL CVEs in the base OS
      # packages and node_modules. `ignore-unfixed: true` skips CVEs that have
      # no patch available so we don't fail builds on advisories the user
      # cannot resolve. Drop that flag if you want to fail on those too.
      - name: Scan ${{ matrix.name }} image with Trivy
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8  # v0.36.0
        with:
          image-ref: ${{ github.event.repository.name }}-${{ matrix.name }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
