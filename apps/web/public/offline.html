<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100svh;
        background: #101113;
        color: #e5e5e5;
        padding: 1.5rem;
        text-align: center;
      }
      .container { max-width: 24rem; }
      .icon {
        width: 4rem;
        height: 4rem;
        margin: 0 auto 1.5rem;
        opacity: 0.5;
      }
      h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
      p { color: #a3a3a3; font-size: 0.875rem; line-height: 1.5; margin-bottom: 1.5rem; }
      button {
        background: #262626;
        color: #e5e5e5;
        border: 1px solid #404040;
        border-radius: 0.375rem;
        padding: 0.625rem 1.25rem;
        font-size: 0.875rem;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      button:active { background: #404040; }
    </style>
  </head>
  <body>
    <div class="container">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
      <h1>You're offline</h1>
      <p>Check your internet connection and try again. Some features may be available once you reconnect.</p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
